<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tycoon Progression & Optimization Calculator</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .countdown {
            background: var(--bg-card);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            font-variant-numeric: tabular-nums;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 0.75rem;
            height: fit-content;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        input, select {
            width: 100%;
            padding: 0.625rem;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 0.375rem;
            box-sizing: border-box;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .results-table th, .results-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .results-table th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.875rem;
        }
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .rarity-common { background: #64748b; color: white; }
        .rarity-rare { background: #3b82f6; color: white; }
        .rarity-epic { background: #a855f7; color: white; }
        .rarity-legendary { background: #f59e0b; color: white; }
        .rarity-mythic { background: #ef4444; color: white; }
        .rarity-godly { background: #ec4899; color: white; }
        .rarity-secret { background: #10b981; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 1.75rem;">Progression & Efficiency Engine</h1>
            <p style="margin: 0.25rem 0 0 0; color: var(--text-muted);">Income Scaling (1.25x) & Cost Scaling (1.5x)</p>
        </div>
        <div class="countdown" id="update-timer">Next Update: Loading...</div>
    </div>

    <div class="grid">
        <!-- Configuration Panel -->
        <div class="panel">
            <h2 style="margin-top:0; font-size: 1.25rem;">Global Modifiers</h2>
            
            <div class="form-group">
                <label for="rebirth">Rebirth Multiplier</label>
                <input type="text" id="rebirth" value="1.5M" placeholder="e.g. 10.5B">
            </div>

            <div class="form-group">
                <label for="mutation">Character Mutation</label>
                <select id="mutation"></select>
            </div>

            <div class="form-group">
                <label for="current-level">Current Level of Upgrades</label>
                <input type="number" id="current-level" value="1" min="1">
            </div>

            <div class="form-group">
                <label for="target-level">Target Level</label>
                <input type="number" id="target-level" value="50" min="2">
            </div>
        </div>

        <!-- Output Dash -->
        <div class="panel">
            <h2 style="margin-top:0; font-size: 1.25rem;">Optimized Tier Projections</h2>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Upgrade Item</th>
                        <th>Rarity</th>
                        <th>Total Cost</th>
                        <th>Projected Income/sec</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <!-- Dynamic injection -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. Large Number Suffix Mapping System
    const SUFFIXES = {
        'K': 1e3, 'M': 1e6, 'B': 1e9, 'T': 1e12, 
        'Q': 1e15, 'QN': 1e18, 'S': 1e21, 'SP': 1e24, 
        'O': 1e27, 'N': 1e30, 'D': 1e33
    };

    function parseShortNotation(val) {
        if (typeof val === 'number') return val;
        val = val.toUpperCase().replace(/,/g, '').trim();
        
        for (let suffix in SUFFIXES) {
            if (val.endsWith(suffix)) {
                let numPart = parseFloat(val.slice(0, -suffix.length));
                return numPart * SUFFIXES[suffix];
            }
        }
        return parseFloat(val) || 0;
    }

    function formatShortNotation(num) {
        if (num === 0) return '0';
        if (num < 1000) return num.toFixed(1);
        
        let absNum = Math.abs(num);
        let chosenSuffix = '';
        let chosenValue = 1;

        // Iterate through to find matching suffix bracket
        for (let suffix in SUFFIXES) {
            if (absNum >= SUFFIXES[suffix]) {
                chosenSuffix = suffix;
                chosenValue = SUFFIXES[suffix];
            }
        }

        let formatted = (num / chosenValue).toFixed(2);
        return `${formatted}${chosenSuffix}`;
    }

    // 2. Game Data Registries (Swapped 'Noobini' out entirely for 'Common')
    const MUTATIONS = {
        'None': 1,
        'Gold': 1.5,
        'Diamond': 3.0,
        'Rainbow': 7.5,
        'Galactic': 15.0,
        'Heavenly': 36.0
    };

    // Scaled sample array matching game tier structures (Expandable to all 69 items)
    const UPGRADE_MANIFEST = [
        { name: "Pizzanini Generator", rarity: "Common", baseCost: 150, baseIncome: 2 },
        { name: "Common Delivery Box", rarity: "Common", baseCost: 800, baseIncome: 12 },
        { name: "Copper Conveyor Belt", rarity: "Rare", baseCost: 4500, baseIncome: 75 },
        { name: "Supercharged Kinetic Engine", rarity: "Epic", baseCost: 25000, baseIncome: 420 },
        { name: "Sub-Atomic Splitter", rarity: "Legendary", baseCost: 175000, baseIncome: 2900 },
        { name: "Mythic Mana Reactor", rarity: "Mythic", baseCost: 1200000, baseIncome: 21000 },
        { name: "Godly Chronos Drive", rarity: "Godly", baseCost: 9500000, baseIncome: 165000 },
        { name: "Kicky Overlord Core", rarity: "Secret", baseCost: 75000000, baseIncome: 1400000 }
    ];

    // 3. Mathematical Calculations
    function calculateCostForRange(baseCost, currentLvl, targetLvl) {
        let totalCost = 0;
        // Cumulative compounding sum loop
        for (let l = currentLvl; l < targetLvl; l++) {
            totalCost += baseCost * Math.pow(1.5, l - 1);
        }
        return totalCost;
    }

    function calculateIncomeAtLevel(baseIncome, targetLvl, globalMulti) {
        // Base scaling rule: 25% exponential jump per step
        return baseIncome * Math.pow(1.25, targetLvl - 1) * globalMulti;
    }

    // 4. Interface Updates
    function init() {
        const mutationSelect = document.getElementById('mutation');
        for (let key in MUTATIONS) {
            let opt = document.createElement('option');
            opt.value = MUTATIONS[key];
            opt.innerText = `${key} (${MUTATIONS[key]}x)`;
            mutationSelect.appendChild(opt);
        }
        mutationSelect.value = "1";

        // Listeners for processing changes instantly
        document.getElementById('rebirth').addEventListener('input', renderProjections);
        document.getElementById('mutation').addEventListener('change', renderProjections);
        document.getElementById('current-level').addEventListener('input', renderProjections);
        document.getElementById('target-level').addEventListener('input', renderProjections);

        renderProjections();
        startUpdateCountdown();
    }

    function renderProjections() {
        const rebirthMulti = parseShortNotation(document.getElementById('rebirth').value);
        const mutationMulti = parseFloat(document.getElementById('mutation').value);
        const currentLvl = parseInt(document.getElementById('current-level').value) || 1;
        const targetLvl = parseInt(document.getElementById('target-level').value) || 2;
        
        const globalMulti = rebirthMulti * mutationMulti;
        const tbody = document.getElementById('results-body');
        tbody.innerHTML = '';

        UPGRADE_MANIFEST.forEach(item => {
            const cost = calculateCostForRange(item.baseCost, currentLvl, targetLvl);
            const income = calculateIncomeAtLevel(item.baseIncome, targetLvl, globalMulti);

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${item.name}</strong></td>
                <td><span class="badge rarity-${item.rarity.toLowerCase()}">${item.rarity}</span></td>
                <td>${formatShortNotation(cost)}</td>
                <td style="color: var(--success); font-weight: 600;">+${formatShortNotation(income)}/s</td>
            `;
            tbody.appendChild(row);
        });
    }

    // 5. Weekly Saturday Update Clock Logic (Europe/Warsaw Baseline)
    function startUpdateCountdown() {
        function updateClock() {
            const now = new Date();
            
            // Set up target window for this week's Saturday at 19:00 UTC/CET equivalent
            let target = new Date();
            target.setUTCHours(17, 0, 0, 0); // 17:00 UTC is 19:00 Central European Summer Time
            
            let daysAhead = (6 - now.getUTCDay() + 7) % 7;
            if (daysAhead === 0 && now.getUTCHours() >= 17) {
                daysAhead = 7; // Target next Saturday if tonight's deadline passed
            }
            target.setUTCDate(now.getUTCDate() + daysAhead);

            const diff = target - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('update-timer').innerText = 
                `Next Update: ${days}d ${hours}h ${mins}m ${secs}s`;
        }
        
        setInterval(updateClock, 1000);
        updateClock();
    }

    window.onload = init;
</script>
</body>
</html>
