<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Incremental Calculator & Dashboard</title>
    <style>
        :root {
            --bg-main: #1e1412;
            --bg-card: #2c1e1b;
            --bg-input: #3a2a26;
            --border-glow: #ff7a59;
            --text-accent: #ff9e80;
            --text-muted: #a8928d;
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --card-border: 1px solid #4a3530;
            --theme-font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--theme-font);
            transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
        }

        body {
            background-color: var(--bg-main);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            background: var(--bg-card);
            border: var(--card-border);
            box-shadow: var(--card-shadow);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 110px));
            gap: 6px;
            margin-top: 10px;
        }

        .theme-btn {
            background: var(--bg-input);
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 6px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            text-transform: capitalize;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .theme-btn:hover {
            border-color: var(--border-glow);
            color: #fff;
        }

        .theme-btn.active {
            background: var(--border-glow);
            color: var(--bg-main);
            font-weight: bold;
        }

        .config-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .btn-action {
            background: var(--bg-input);
            border: 1px solid var(--border-glow);
            color: #ffffff;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-action:hover {
            background: var(--border-glow);
            color: var(--bg-main);
        }

        #countdownBanner {
            background: linear-gradient(90deg, rgba(231,76,60,0.2) 0%, rgba(142,68,173,0.2) 100%);
            border: 1px solid rgba(231,76,60,0.5);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #ff9f43;
            display: none;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-card);
            border: var(--card-border);
            box-shadow: var(--card-shadow);
            border-radius: 12px;
            padding: 22px;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--text-accent);
            border-bottom: 1px solid var(--bg-input);
            padding-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="number"], select {
            background: var(--bg-input);
            border: 1px solid var(--card-border);
            color: #ffffff;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--border-glow);
        }

        .results-box {
            margin-top: 20px;
            background: var(--bg-main);
            border: 1px dashed var(--border-glow);
            border-radius: 8px;
            padding: 15px;
            display: none;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 13px;
        }

        .results-grid div {
            color: var(--text-muted);
        }

        .results-grid span {
            color: #ffffff;
            font-weight: 600;
            display: block;
            font-size: 14px;
            margin-top: 2px;
        }

        .mutation-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .mutation-row {
            background: var(--bg-input);
            border: 1px solid transparent;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mutation-row:hover {
            border-color: rgba(255,122,89,0.4);
        }

        .mutation-row.selected {
            background: var(--border-glow);
            color: var(--bg-main);
            font-weight: bold;
        }

        .mutation-row.selected .mut-val {
            color: var(--bg-main);
            opacity: 0.9;
        }

        .mut-name {
            font-size: 14px;
        }

        .mut-val {
            font-size: 12px;
            color: var(--text-accent);
        }

        .saved-container {
            margin-top: 20px;
            grid-column: span 2;
        }

        @media (max-width: 900px) {
            .saved-container {
                grid-column: span 1;
            }
        }

        .saved-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 12px;
        }

        .saved-item {
            background: var(--bg-input);
            border: var(--card-border);
            border-radius: 8px;
            padding: 14px;
            position: relative;
        }

        .saved-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .saved-title {
            background: transparent;
            border: none;
            color: var(--text-accent);
            font-weight: bold;
            font-size: 14px;
            width: 100%;
        }

        .saved-title:focus {
            background: var(--bg-main);
            padding: 2px 5px;
            border-radius: 4px;
            outline: none;
        }

        .btn-del {
            background: transparent;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
        }

        .saved-stats {
            display: grid;
            grid-template-columns: 1fr;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .saved-stats span {
            color: #fff;
            font-weight: 500;
        }

        .list-section {
            grid-column: span 2;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .list-section {
                grid-column: span 1;
            }
        }

        .list-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .search-box-wrapper {
            display: flex;
            gap: 10px;
            flex-grow: 1;
        }

        .brainrot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
        }

        .brainrot-grid.collapsed {
            display: none !important;
        }

        .rot-item {
            background: var(--bg-input);
            border: var(--card-border);
            border-radius: 8px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .rot-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 8px;
            margin-bottom: 10px;
        }

        .rot-name {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        .rot-meta-block {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .rot-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-noobini { background: #7f8c8d; color: #fff; }
        .badge-mythic { background: #9b59b6; color: #fff; }
        .badge-hacked { background: #e74c3c; color: #fff; }
        .badge-celestial { background: #3498db; color: #fff; }
        .badge-eternal { background: #f1c40f; color: #2c3e50; }

        .rot-cost-calc-box {
            text-align: right;
        }

        .rot-cost-amt {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-accent);
        }

        .rot-cost-time {
            font-size: 10px;
            color: var(--text-muted);
        }

        .rot-body-metrics {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 3px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
        }

        .rot-body-metrics span {
            color: #fff;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="control-row">
            <div>
                <h1 style="font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px;">Brainrot Multiplier Engine</h1>
                <p style="font-size: 13px; color: var(--text-muted); margin-top: 2px;">Optimized upgrade progressions & multi-tier mutation scales.</p>
            </div>
            <div class="config-actions">
                <label class="toggle-container">
                    <input type="checkbox" id="fontToggle" onchange="toggleCustomFonts()">
                    <span>Thematic Typography</span>
                </label>
                <button class="btn-action" id="setDefaultBtn" onclick="saveDefaultTheme()">Use as Default</button>
            </div>
        </div>
        <div class="theme-grid" id="themeContainer"></div>
    </header>

    <div id="countdownBanner"></div>

    <div class="dashboard-layout">
        
        <!-- CALCULATOR INPUTS PANEL -->
        <div class="panel">
            <div class="panel-title">Configuration & Core Metrics</div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="dayInc">Daily Income</label>
                    <input type="text" id="dayInc" value="10.5M" oninput="globalInputsUpdated()">
                </div>
                <div class="form-group">
                    <label for="rebirthMulti">Rebirth Multiplier</label>
                    <input type="number" id="rebirthMulti" value="2.5" step="0.1" min="1" oninput="globalInputsUpdated()">
                </div>
                <div class="form-group">
                    <label for="curLvl">Current Level</label>
                    <input type="number" id="curLvl" value="1" min="1" oninput="globalInputsUpdated()">
                </div>
                <div class="form-group">
                    <label for="tarLvl">Target Level</label>
                    <input type="number" id="tarLvl" value="75" min="2" oninput="globalInputsUpdated()">
                </div>
                
                <div class="form-group full-width" style="margin-top: 10px; border-top: 1px dashed var(--bg-input); padding-top: 15px;">
                    <label style="color: var(--text-accent);">Calculator Overrides (Single Upgrades)</label>
                </div>
                
                <div class="form-group">
                    <label for="curInc">Current Base Income (/s)</label>
                    <input type="text" id="curInc" value="500" oninput="overrideInputsUpdated()">
                </div>
                <div class="form-group">
                    <label for="curCost">Current Base Cost</label>
                    <input type="text" id="curCost" value="12.5K" oninput="overrideInputsUpdated()">
                </div>
                
                <div class="form-group full-width" style="display: flex; flex-direction: row; gap: 10px; margin-top: 10px;">
                    <button class="btn-action" style="flex: 1;" onclick="calculateOverride()">Calculate</button>
                    <button class="btn-action" style="flex: 1; border-color: #2ecc71;" onclick="saveOverrideBuild()">Save Build</button>
                </div>
            </div>

            <div class="results-box" id="results">
                <div class="results-grid">
                    <div>Base Level 1: <span id="resLvl1">-</span></div>
                    <div>Base Max Level: <span id="resBaseInc">-</span></div>
                    <div>Max Rebirth Output: <span id="resInc" style="color:var(--text-accent);">-</span></div>
                    <div>Daily Net Value: <span id="resAddedDaily" style="color:#2ecc71;">-</span></div>
                    <div>Total Cost Sum: <span id="resCost">-</span></div>
                    <div>Time Required: <span id="resTime" style="color:var(--border-glow);">-</span></div>
                </div>
            </div>
        </div>

        <!-- MUTATIONS SELECTION PANEL -->
        <div class="panel">
            <div class="panel-title">Active Mutation Matrix</div>
            <div class="mutation-list" id="mutationsList"></div>
        </div>

        <!-- SAVED CONFIGURATIONS TRACKER -->
        <div class="panel saved-container">
            <div class="panel-title">Saved Configurations</div>
            <div class="saved-grid" id="savedList"></div>
        </div>

        <!-- EXPLORER GRID ELEMENT -->
        <div class="panel list-section">
            <div class="panel-title">Upgrade Hierarchy Matrix</div>
            <div class="list-controls">
                <button class="btn-action" id="toggleListBtn" onclick="toggleBrainrotGrid()">Hide List</button>
                <div class="search-box-wrapper" id="searchControls">
                    <select id="rarityFilter" style="max-width: 150px;" onchange="renderBrainrotList()">
                        <option value="all">All Rarities</option>
                        <option value="noobini">Noobini</option>
                        <option value="mythic">Mythic</option>
                        <option value="hacked">Hacked</option>
                        <option value="celestial">Celestial</option>
                        <option value="eternal">Eternal</option>
                    </select>
                    <input type="text" id="searchBar" placeholder="Search upgrade name or rarity tier..." oninput="debounceRenderGrid()">
                </div>
            </div>
            <div class="brainrot-grid" id="rotGrid"></div>
        </div>

    </div>

            'blood-moon': { main: '#1a0505', card: '#2b0a0a', input: '#3c0f0f', glow: '#ff3333', accent: '#ff6666', muted: '#aa7777', border: '1px solid #4c1414', shadow: '0 8px 32px rgba(255,0,0,0.2)', font: "Impact, sans-serif" },

            { id: 1, name: "Gyatt Elasticity I", val: 1.25 },

        ];

        const BRAINROT_UPGRADES = [
            { name: "Fanum Tax Collection Grid", rarity: "noobini", baseInc: 120 },

            { name: "Sigma Male Grindset Protocol", rarity: "hacked", baseInc: 24500 },
            { name: "Mewing Streak Kinetic Harness", rarity: "hacked", baseInc: 98000 },
            { name: "Goon Cave Ambient Subwoofer", rarity: "celestial", baseInc: 410000 },
            { name: "Looksmaxxing Photon Refractor", rarity: "celestial", baseInc: 1850000 },
            { name: "Edge Lord Temporal Decelerator", rarity: "eternal", baseInc: 8900000 },
            { name: "Brainrot Multiverse Core Spindle", rarity: "eternal", baseInc: 45000000 }
        ];

        // STORAGE MANAGEMENT CONFIG
        const SAVE_KEY_INCOME = 'br_saved_income';
        const SAVE_KEY_REBIRTH = 'br_saved_rebirth';
        const SAVE_KEY_THEME = 'br_saved_theme';
        const SAVE_KEY_FONTS = 'br_saved_fonts';
        const SAVE_KEY_BUILDS = 'br_saved_builds_json';

        let selectedMutationId = null;
        let gridDebounceTimeout = null;
        let currentlySelectedTheme = 'og-cocoa';
        let savedBuilds = [];

        // ONLOAD PERSISTENT INITIALIZATION
        window.onload = function() {
            // Rehydrate Fields
            if (localStorage.getItem(SAVE_KEY_INCOME)) {
                document.getElementById('dayInc').value = localStorage.getItem(SAVE_KEY_INCOME);
            }
            if (localStorage.getItem(SAVE_KEY_REBIRTH)) {
                document.getElementById('rebirthMulti').value = localStorage.getItem(SAVE_KEY_REBIRTH);
            }
            
            // Rehydrate Saved Configurations
            try {
                const storedBuilds = localStorage.getItem(SAVE_KEY_BUILDS);
                if (storedBuilds) {
                    savedBuilds = JSON.parse(storedBuilds);
                }
            } catch(e) { savedBuilds = []; }

            // Rehydrate Theme Configs
            const loadedTheme = localStorage.getItem(SAVE_KEY_THEME) || 'og-cocoa';
            const fontToggleVal = localStorage.getItem(SAVE_KEY_FONTS) === 'true';
            document.getElementById('fontToggle').checked = fontToggleVal;

            // Generate Engine Themes Container Elements
            const tContainer = document.getElementById('themeContainer');
            Object.keys(THEMES).forEach(tk => {
                tContainer.innerHTML += `<button class="theme-btn" id="theme-${tk}" onclick="setTheme('${tk}')">${tk.replace('-', ' ')}</button>`;
            });

            // Initialize Mutations Matrix UI
            const mList = document.getElementById('mutationsList');
            MUTATIONS_DATA.forEach(item => {
                mList.innerHTML += `
                    <div class="mutation-row" id="mutrow-${item.id}" onclick="toggleMutation(${item.id})">
                        <span class="mut-name">${item.name}</span>
                        <span class="mut-val">${item.val}x</span>
                    </div>
                `;
            });

            setTheme(loadedTheme);
            initSaturdayCountdown();
            renderSavedBuilds();
            globalInputsUpdated();
        };

        // TIME-ZONE SPECIFIC EUROPE/WARSAW COUNTDOWN SYSTEM
        function initSaturdayCountdown() {
            const banner = document.getElementById('countdownBanner');
            
            function refreshTimer() {
                const now = new Date();
                
                // Convert to Europe/Warsaw Time Zone equivalents
                const targetTimeZone = 'Europe/Warsaw';
                const localTimeString = now.toLocaleString('en-US', { timeZone: targetTimeZone });
                const warsawTime = new Date(localTimeString);
                
                // Calculate distance parameters to coming Saturday at 19:00
                let daysToSaturday = (6 - warsawTime.getDay() + 7) % 7;
                
                let targetDate = new Date(warsawTime);
                targetDate.setDate(warsawTime.getDate() + daysToSaturday);
                targetDate.setHours(19, 0, 0, 0);
                
                // If past Saturday 19:00, seek target threshold for following week
                if (warsawTime.getDay() === 6 && warsawTime.getHours() >= 19) {
                    targetDate.setDate(targetDate.getDate() + 7);
                }

                // Compute differential delta parameters
                const diffMs = targetDate - warsawTime;
                const totalHoursRemaining = diffMs / (1000 * 60 * 60);

                // Show localized countdown banner exclusively within 3 days (72 hours) window
                if (totalHoursRemaining <= 72 && totalHoursRemaining > 0) {
                    const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const mins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                    const secs = Math.floor((diffMs % (1000 * 60)) / 1000);
                    
                    banner.innerText = `🚨 SPREAD MATRIX BOOSTER EVENT ACTIVATING IN: ${days}d ${hours}h ${mins}m ${secs}s (Warsaw Time) 🚨`;
                    banner.style.display = 'block';
                } else {
                    banner.style.display = 'none';
                }
            }
            
            refreshTimer();
            setInterval(refreshTimer, 1000);
        }

        // --- PART 3 CODE INSERTED INTACT BELOW ---
        function toggleMutation(id) {
            const currentSelected = document.getElementById(`mutrow-${id}`);
            if (selectedMutationId === id) {
                currentSelected.classList.remove('selected');
                selectedMutationId = null;
            } else {
                if (selectedMutationId) {
                    const previousSelected = document.getElementById(`mutrow-${selectedMutationId}`);
                    if (previousSelected) previousSelected.classList.remove('selected');
                }
                currentSelected.classList.add('selected');
                selectedMutationId = id;
            }
            globalInputsUpdated();
        }

        function getActiveMutationMultiplier() {
            if (!selectedMutationId) return 1;
            const item = MUTATIONS_DATA.find(m => m.id === selectedMutationId);
            return item ? item.val : 1;
        }

        function toggleBrainrotGrid() {
            const grid = document.getElementById('rotGrid');
            const btn = document.getElementById('toggleListBtn');
            const searchWrapper = document.getElementById('searchControls');
            
            if (grid.classList.contains('collapsed')) {
                grid.classList.remove('collapsed');
                searchWrapper.style.visibility = 'visible';
                btn.innerText = 'Hide List';
            } else {
                grid.classList.add('collapsed');
                searchWrapper.style.visibility = 'hidden';
                btn.innerText = 'Show List';
            }
        }

        function debounceRenderGrid() {
            clearTimeout(gridDebounceTimeout);
            gridDebounceTimeout = setTimeout(() => {
                renderBrainrotList();
            }, 250);
        }

        function globalInputsUpdated() {
            liveSaveFields();
            if (document.getElementById('results').style.display === 'block') {
                calculateOverride();
            }
            debounceRenderGrid();
        }

        function overrideInputsUpdated() {
            if (document.getElementById('results').style.display === 'block') {
                calculateOverride();
            }
        }

        function renderBrainrotList() {
            const grid = document.getElementById('rotGrid');
            const filter = document.getElementById('rarityFilter').value;
            const query = document.getElementById('searchBar').value.toLowerCase().trim();
            
            let mutationMult = getActiveMutationMultiplier();
            let rebirthMulti = parseFloat(document.getElementById('rebirthMulti').value) || 1;
            let targetLvl = parseInt(document.getElementById('tarLvl').value) || 75;
            let currentLvl = parseInt(document.getElementById('curLvl').value) || 1;
            let rawDailyIncome = parseInput(document.getElementById('dayInc').value);

            if (currentLvl >= targetLvl) currentLvl = 1; 
            let scaleSteps = targetLvl - 1;

            let recordsFound = 0;
            let htmlBuffer = '';

            BRAINROT_UPGRADES.forEach(upg => {
                if (filter !== 'all' && upg.rarity !== filter) return;
                
                if (query !== '') {
                    const matchName = upg.name.toLowerCase().includes(query);
                    const matchRarity = upg.rarity.toLowerCase().includes(query);
                    if (!matchName && !matchRarity) return;
                }

                recordsFound++;

                let rawBaseLvl1 = upg.baseInc * mutationMult;
                let rawRebirthLvl1 = rawBaseLvl1 * rebirthMulti;
                let rawBaseMax = rawBaseLvl1 * Math.pow(1.25, scaleSteps);
                let rawRebirthMax = rawBaseMax * rebirthMulti;

                let individualUpgradeCostSum = 0;
                let activeBaseCostStep = upg.baseInc * mutationMult; 
                for (let levelStep = 0; levelStep < scaleSteps; levelStep++) {
                    individualUpgradeCostSum += activeBaseCostStep;
                    activeBaseCostStep *= 1.5;
                }

                let cardTimeString = "-";
                if (rawDailyIncome > 0) {
                    let totalHoursNeeded = individualUpgradeCostSum / (rawDailyIncome / 24.0);
                    if (totalHoursNeeded < 0.01) {
                        cardTimeString = "Instant";
                    } else if (totalHoursNeeded < 1) {
                        cardTimeString = (totalHoursNeeded * 60).toFixed(1) + " mins";
                    } else if (totalHoursNeeded > 24) {
                        cardTimeString = (totalHoursNeeded / 24).toFixed(1) + " days";
                    } else {
                        cardTimeString = totalHoursNeeded.toFixed(1) + " hours";
                    }
                }

                htmlBuffer += `
                    <div class="rot-item">
                        <div class="rot-header">
                            <span class="rot-name">${upg.name}</span>
                            <div class="rot-meta-block">
                                <span class="rot-badge badge-${upg.rarity}">${upg.rarity}</span>
                                <div class="rot-cost-calc-box">
                                    <div class="rot-cost-amt">${formatOutput(individualUpgradeCostSum)}</div>
                                    <div class="rot-cost-time">${cardTimeString}</div>
                                </div>
                            </div>
                        </div>
                        <div class="rot-body-metrics">
                            <div>Base Level 1: <span>${formatOutput(rawBaseLvl1)}/s</span></div>
                            <div>Rebirth Multi Base Level 1: <span style="color:var(--text-accent);">${formatOutput(rawRebirthLvl1)}/s</span></div>
                            <div>Base Max Lvl (Lvl ${targetLvl}): <span>${formatOutput(rawBaseMax)}/s</span></div>
                            <div>Max Lvl Rebirth Multi (Lvl ${targetLvl}): <span style="color:#2ecc71;">${formatOutput(rawRebirthMax)}/s</span></div>
                        </div>
                    </div>
                `;
            });

            if (recordsFound === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 30px; opacity: 0.6;">No brainrots match your criteria.</div>`;
            } else {
                grid.innerHTML = htmlBuffer;
            }
        }

        // TEXT-SAFE OPERATORS EMPLOYED INTERNALLY INSIDE RELATIONAL LOGIC PARSES
        function runOverrideMath() {
            let curLvl = parseInt(document.getElementById('curLvl').value);
            let tarLvl = parseInt(document.getElementById('tarLvl').value);
            let rawDailyIncome = parseInput(document.getElementById('dayInc').value);
            let rawCurIncome = parseInput(document.getElementById('curInc').value);
            let rawCurCost = parseInput(document.getElementById('curCost').value);
            let rebirthMulti = parseFloat(document.getElementById('rebirthMulti').value) || 1;

            if (isNaN(curLvl) || isNaN(tarLvl) || rawCurIncome <= 0 || curLvl >= tarLvl) return null;

            let totalCost = 0;
            let tempCost = rawCurCost;
            let growthFactor = 1;

            for (let i = 0; i < (tarLvl - curLvl); i++) {
                if (rawCurCost > 0) { totalCost += tempCost; tempCost *= 1.5; }
                growthFactor *= 1.25;
            }

            let baseLvl1Stat = rawCurIncome / Math.pow(1.25, (curLvl - 1));
            let baseIncNoMulti = rawCurIncome * growthFactor; 
            let finalOutputWithRebirth = baseIncNoMulti * rebirthMulti;
            let currentOutputWithRebirth = rawCurIncome * rebirthMulti;
            let dailyNetAddedValue = (finalOutputWithRebirth - currentOutputWithRebirth) * 86400;

            let timeString = "N/A";
            if (rawDailyIncome > 0 && rawCurCost > 0) {
                let timeHours = totalCost / (rawDailyIncome / 24.0);
                timeString = timeHours < 0.01 ? "Instant" : timeHours < 1 ? (timeHours * 60).toFixed(1) + " mins" : timeHours > 24 ? (timeHours / 24).toFixed(1) + " days" : timeHours.toFixed(1) + " hours";
            }

            return {
                label: `Lvl ${curLvl} → Lvl ${tarLvl} Build`,
                lvl1Base: formatOutput(baseLvl1Stat) + "/s",
                baseInc: formatOutput(baseIncNoMulti) + "/s",
                finalInc: formatOutput(finalOutputWithRebirth) + "/s",
                addedDaily: "+" + formatOutput(dailyNetAddedValue),
                totalCost: rawCurCost > 0 ? formatOutput(totalCost) : "N/A",
                timeReq: timeString
            };
        }

        function calculateOverride() {
            let res = runOverrideMath();
            if (!res) return;
            document.getElementById('resLvl1').innerText = res.lvl1Base;
            document.getElementById('resBaseInc').innerText = res.baseInc;
            document.getElementById('resInc').innerText = res.finalInc;
            document.getElementById('resAddedDaily').innerText = res.addedDaily;
            document.getElementById('resCost').innerText = res.totalCost;
            document.getElementById('resTime').innerText = res.timeReq;
            document.getElementById('results').style.display = 'block';
        }

        function saveOverrideBuild() {
            let data = runOverrideMath();
            if (!data) return;
            savedBuilds.push(data);
            localStorage.setItem(SAVE_KEY_BUILDS, JSON.stringify(savedBuilds));
            renderSavedBuilds();
        }

        function liveSaveFields() {
            localStorage.setItem(SAVE_KEY_INCOME, document.getElementById('dayInc').value);
            localStorage.setItem(SAVE_KEY_REBIRTH, document.getElementById('rebirthMulti').value);
        }

        function parseInput(valStr) {
            if (!valStr) return 0;
            valStr = valStr.toUpperCase().replace(/[\s,$]/g, '');
            for (let suffix of ['QN', 'SP']) {
                if (valStr.endsWith(suffix)) return parseFloat(valStr.slice(0, -suffix.length)) * SUFFIXES[suffix];
            }
            let lastChar = valStr.slice(-1);
            if (SUFFIXES[lastChar]) return parseFloat(valStr.slice(0, -1)) * SUFFIXES[lastChar];
            return parseFloat(valStr) || 0;
        }

        function formatOutput(num) {
            if (num === 0) return '0';
            if (num < 1000) return num.toFixed(2).replace(/\.00$/, '');
            let sortedKeys = Object.keys(SUFFIXES).sort((a, b) => SUFFIXES[b] - SUFFIXES[a]);
            for (let key of sortedKeys) {
                if (num >= SUFFIXES[key]) return (num / SUFFIXES[key]).toFixed(2).replace(/\.00$/, '') + key;
            }
            return num.toFixed(2).replace(/\.00$/, '');
        }

        function deleteBuild(index) {
            savedBuilds.splice(index, 1);
            localStorage.setItem(SAVE_KEY_BUILDS, JSON.stringify(savedBuilds));
            renderSavedBuilds();
        }

        function renderSavedBuilds() {
            const list = document.getElementById('savedList');
            list.innerHTML = '';
            if (savedBuilds.length === 0) {
                list.innerHTML = '<div style="color:var(--text-muted); text-align:center; font-size:14px; margin-top:30px; opacity: 0.6;">No configurations saved yet.</div>';
                return;
            }
            savedBuilds.forEach((build, index) => {
                list.innerHTML += `
                    <div class="saved-item">
                        <div class="saved-title-container">
                            <input class="saved-title" type="text" value="${build.label}" oninput="savedBuilds[${index}].label=this.value; localStorage.setItem(SAVE_KEY_BUILDS, JSON.stringify(savedBuilds));">
                            <button class="btn-del" onclick="deleteBuild(${index})">✕</button>
                        </div>
                        <div class="saved-stats">
                            <div>Base Level 1: <span>${build.lvl1Base}</span></div>
                            <div>Base Max Lvl: <span>${build.baseInc}</span></div>
                            <div>Max Lvl Rebirth Multi: <span style="color:var(--text-accent);">${build.finalInc}</span></div>
                            <div>Daily Gain: <span style="color:#2ecc71;">${build.addedDaily}</span></div>
                            <div>Cost: <span>${build.totalCost}</span></div>
                            <div>Time: <span style="color:var(--border-glow);">${build.timeReq}</span></div>
                        </div>
                    </div>
                `;
            });
        }

        function setTheme(themeKey) {
            currentlySelectedTheme = themeKey;
            const theme = THEMES[themeKey];
            const root = document.documentElement;
            
            root.style.setProperty('--bg-main', theme.main);
            root.style.setProperty('--bg-card', theme.card);
            root.style.setProperty('--bg-input', theme.input);
            root.style.setProperty('--border-glow', theme.glow);
            root.style.setProperty('--text-accent', theme.accent);
            root.style.setProperty('--text-muted', theme.muted);
            root.style.setProperty('--card-shadow', theme.shadow);
            root.style.setProperty('--card-border', theme.border);

            toggleCustomFonts();

            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`theme-${themeKey}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function toggleCustomFonts() {
            const fontToggle = document.getElementById('fontToggle').checked;
            const root = document.documentElement;
            
            localStorage.setItem(SAVE_KEY_FONTS, fontToggle);

            if (fontToggle && THEMES[currentlySelectedTheme]) {
                root.style.setProperty('--theme-font', THEMES[currentlySelectedTheme].font);
            } else {
                root.style.setProperty('--theme-font', "'Segoe UI', system-ui, -apple-system, sans-serif");
            }
        }

        function saveDefaultTheme() {
            localStorage.setItem(SAVE_KEY_THEME, currentlySelectedTheme);
            const defBtn = document.getElementById('setDefaultBtn');
            defBtn.innerText = '✓ Default Set!';
            setTimeout(() => { defBtn.innerText = 'Use as Default'; }, 2000);
        }
    </script>
</body>
