<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Brainrot Tool Suite</title>
    <style>
        :root {
            --bg-main: #0a0503;
            --bg-card: #160d07;
            --bg-input: #26160c;
            --border-glow: #ffaa00;
            --text-main: #f0e6df;
            --text-accent: #00ffcc;
            --text-muted: #a69285;
            --btn-success: #2ecc71;
            --btn-success-hover: #27ae60;
            --btn-primary: #3498db;
            --btn-primary-hover: #2980b9;
            --btn-danger: #e74c3c;
            --btn-danger-hover: #c0392b;
            --card-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            --card-border: 1px solid rgba(255, 255, 255, 0.04);
            --transition-speed: 0.25s;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: auto;
        }

        .theme-sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--bg-card);
            border-right: var(--card-border);
            padding: 30px 18px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .theme-sidebar::-webkit-scrollbar { width: 4px; }
        .theme-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 4px; }

        .btn-set-default {
            width: 100%;
            padding: 10px 12px;
            background-color: transparent;
            border: 1px dashed var(--border-glow);
            color: var(--border-glow);
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-align: center;
            box-sizing: border-box;
        }

        .btn-set-default:hover { background-color: var(--border-glow); color: var(--bg-main); }

        .workspace-layout {
            display: grid;
            grid-template-columns: 280px minmax(550px, 1fr) 320px;
            gap: 25px;
            padding: 40px 30px;
            flex-grow: 1;
            width: calc(100% - 220px);
            min-width: 1150px;
            box-sizing: border-box;
        }

        @media (max-width: 1300px) {
            body { flex-direction: column; overflow-x: visible; }
            .theme-sidebar { width: 100%; min-width: 100%; height: auto; position: relative; border-right: none; border-bottom: var(--card-border); padding: 20px; flex-direction: row; flex-wrap: wrap; align-items: center; }
            .btn-set-default { width: auto; margin-bottom: 0; margin-left: auto; padding: 12px 16px; }
            .workspace-layout { grid-template-columns: 1fr; width: 100%; min-width: 100%; padding: 20px; }
        }

        .calculator-card, .saved-card, .mutations-card, .rot-card {
            background: var(--bg-card);
            border: var(--card-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            height: fit-content;
        }

        .mutations-card { padding: 20px; }
        .calculator-card { min-width: 500px; }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--border-glow);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
            width: 100%;
        }

        .theme-btn {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            background: var(--bg-input);
            color: var(--text-main);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
        }

        .theme-btn:hover { border-color: var(--border-glow); background: rgba(255, 255, 255, 0.02); }
        .theme-btn.active { border-color: var(--border-glow); background: rgba(255, 255, 255, 0.05); }
        .theme-dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 8px currentColor; flex-shrink: 0; }

        .mutation-grid { display: grid; grid-template-columns: 1fr; gap: 8px; max-height: 520px; overflow-y: auto; padding-right: 4px; }
        .mutation-grid::-webkit-scrollbar { width: 4px; }
        .mutation-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .mutation-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(0, 0, 0, 0.15); border-radius: 10px; font-size: 13px; border: 1px solid rgba(255, 255, 255, 0.02); cursor: pointer; user-select: none; }
        .mutation-row:hover { background: rgba(255, 255, 255, 0.02); border-color: rgba(255, 255, 255, 0.08); }
        .mutation-row.selected { border-color: var(--border-glow); background: rgba(255, 170, 0, 0.04); }
        .mutation-cb { appearance: none; width: 16px; height: 16px; border: 2px solid var(--text-muted); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .mutation-row.selected .mutation-cb { border-color: var(--border-glow); background: var(--border-glow); }
        .mutation-row.selected .mutation-cb::after { content: '✓'; color: var(--bg-main); font-size: 11px; font-weight: 900; }
        .mutation-name { font-weight: 600; text-transform: capitalize; flex-grow: 1; }
        .mutation-value { font-family: monospace; color: var(--text-accent); font-weight: 700; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; text-transform: uppercase; color: var(--text-muted); }
        input, select { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08); background-color: var(--bg-input); color: var(--text-main); font-size: 16px; font-weight: 500; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: var(--border-glow); box-shadow: 0 0 12px rgba(255, 170, 0, 0.15); }

        .btn-flex { display: flex; gap: 15px; margin-top: 25px; }
        button.action-btn { padding: 16px 24px; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; flex: 1; }
        .btn-calc { background-color: var(--btn-success); flex: 2; }
        .btn-save { background-color: var(--btn-primary); }

        #results { margin-top: 30px; padding: 20px; background-color: rgba(0, 0, 0, 0.2); border-top: 1px dashed rgba(255, 255, 255, 0.08); border-bottom: 1px dashed rgba(255, 255, 255, 0.08); display: none; }
        .res-grid-mini { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 24px; }

        .mini-stat-box { display: flex; flex-direction: column; }
        .mini-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px; font-weight: 600; }
        .mini-val { font-size: 15px; font-weight: 700; font-family: monospace; color: var(--text-main); }

        .saved-list { margin-top: 5px; max-height: 550px; overflow-y: auto; padding-right: 4px; }
        .saved-item { background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
        .saved-title-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .saved-title { color: var(--border-glow); font-weight: 700; background: transparent; border: none; border-bottom: 1px solid transparent; font-size: 14px; width: 80%; }
        .btn-del { background: transparent; border: 1px solid rgba(231, 76, 60, 0.3); color: var(--btn-danger); border-radius: 8px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .saved-stats { font-size: 12px; color: var(--text-main); display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; }
        .saved-stats span { font-family: monospace; font-weight: bold; }

        .rot-card { grid-column: 1 / -1; margin-top: 10px; }
        .list-header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 20px; flex-wrap: wrap; }
        .search-controls-wrapper { display: flex; gap: 15px; flex-grow: 1; justify-content: flex-end; max-width: 600px; width: 100%; }
        .search-input { padding: 10px 14px; font-size: 14px; border-radius: 10px; flex-grow: 2; }
        .filter-select { width: auto; min-width: 180px; padding: 10px 14px; font-size: 14px; border-radius: 10px; flex-grow: 1; }
        .rot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; }
        .rot-item { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
        .rot-header { display: flex; justify-content: space-between; align-items: center; }
        .rot-name { font-weight: 700; font-size: 14px; color: var(--text-main); }
        .rot-badge { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }

        .badge-noobini { background: rgba(166, 146, 133, 0.1); color: #a69285; border: 1px solid rgba(166, 146, 133, 0.2); }
        .badge-rare { background: rgba(52, 152, 219, 0.1); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.2); }
        .badge-epic { background: rgba(155, 89, 182, 0.1); color: #9b59b6; border: 1px solid rgba(155, 89, 182, 0.2); }
        .badge-legendary { background: rgba(241, 196, 15, 0.1); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.2); }
        .badge-mythic { background: rgba(230, 126, 34, 0.1); color: #e67e22; border: 1px solid rgba(230, 126, 34, 0.2); }
        .badge-godly { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.2); }
        .badge-secret { background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid rgba(0, 255, 204, 0.2); }
        .badge-divine { background: rgba(255, 0, 255, 0.1); color: #ff00ff; border: 1px solid rgba(255, 0, 255, 0.2); }
        .badge-hacked { background: rgba(118, 255, 3, 0.1); color: #76ff03; border: 1px solid rgba(118, 255, 3, 0.2); }
        .badge-og { background: rgba(234, 32, 39, 0.1); color: #ea2027; border: 1px solid rgba(234, 32, 39, 0.2); }
        .badge-celestial { background: rgba(0, 210, 211, 0.1); color: #00d2d1; border: 1px solid rgba(0, 210, 211, 0.2); }
        .badge-eternal { background: rgba(253, 121, 168, 0.1); color: #fd79a8; border: 1px solid rgba(253, 121, 168, 0.2); }

        .rot-body-metrics { font-size: 12px; color: var(--text-muted); display: grid; grid-template-columns: 1fr; gap: 5px; background: rgba(0, 0, 0, 0.1); padding: 12px; border-radius: 8px; }
        .rot-body-metrics div span { font-family: monospace; color: var(--text-main); font-weight: 600; }
    </style>
</head>
<body>

    <div class="theme-sidebar">
        <h2>Themes</h2>
        <button class="btn-set-default" id="setDefaultBtn" onclick="saveDefaultTheme()">Use as Default</button>
        <button class="theme-btn active" onclick="setTheme('og')" id="theme-og"><span class="theme-dot" style="color:#ffaa00; background:#ffaa00;"></span> OG Cocoa</button>

        <button class="theme-btn" onclick="setTheme('frost')" id="theme-frost"><span class="theme-dot" style="color:#00bfff; background:#00bfff;"></span> Frostbite</button>

        <button class="theme-btn" onclick="setTheme('luxury')" id="theme-luxury"><span class="theme-dot" style="color:#d4af37; background:#d4af37;"></span> Royal Gold</button>
        <button class="theme-btn" onclick="setTheme('toxic')" id="theme-toxic"><span class="theme-dot" style="color:#76ff03; background:#76ff03;"></span> Bio Sludge</button>
        <button class="theme-btn" onclick="setTheme('synthwave')" id="theme-synthwave"><span class="theme-dot" style="color:#ff5e97; background:#ff5e97;"></span> Outrun 1984</button>
        <button class="theme-btn" onclick="setTheme('mono')" id="theme-mono"><span class="theme-dot" style="color:#ffffff; background:#ffffff;"></span> Minimal Slate</button>
    </div>

    <div class="workspace-layout">
        <div class="mutations-card">
            <h2>Mutations</h2>
            <div class="mutation-grid" id="mutationGrid"></div>
        </div>

        <div class="calculator-card">
            <h2>Brainrot Calculator</h2>
            <div class="grid-2">
                <div class="input-group">
                    <label>Daily Offline Income Pool</label>
                    <input type="text" id="dayInc" value="" placeholder="e.g. 1.1S" oninput="globalInputsUpdated()">
                </div>
                <div class="input-group">
                    <label>Rebirth Multiplier</label>
                    <input type="number" id="rebirthMulti" value="" placeholder="e.g. 1" min="1" step="0.1" oninput="globalInputsUpdated()">
                </div>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Brainrot Current Level</label>
                    <input type="number" id="curLvl" value="" placeholder="e.g. 1" oninput="globalInputsUpdated()">
                </div>
                <div class="input-group">
                    <label>Brainrot Target Level</label>
                    <input type="number" id="tarLvl" value="75" oninput="globalInputsUpdated()">
                </div>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Override Income/s</label>
                    <input type="text" id="curInc" value="" placeholder="e.g. 420.3K" oninput="globalInputsUpdated()">
                </div>
                <div class="input-group">
                    <label>Override Base Cost</label>
                    <input type="text" id="curCost" value="" placeholder="e.g. 15" oninput="globalInputsUpdated()">
                </div>
            </div>
            <div class="btn-flex">
                <button class="action-btn btn-calc" onclick="calculateOverride()">Calculate Manual Entry</button>
                <button class="action-btn btn-save" onclick="saveOverrideBuild()">Save Build</button>
            </div>

            <div id="results">

                    <div class="mini-stat-box"><span class="mini-label">Base Max Lvl</span><span id="resBaseInc" class="mini-val" style="color: #bdc581;">-</span></div>
                    <div class="mini-stat-box"><span class="mini-label">Max Lvl Rebirth Multi</span><span id="resInc" class="mini-val" style="color: var(--text-accent);">-</span></div>
                    <div class="mini-stat-box"><span class="mini-label">Daily Gain</span><span id="resAddedDaily" class="mini-val" style="color: #2ecc71;">-</span></div>

                </div>
            </div>
        </div>

        <div class="saved-card">
            <h2>Saved Configurations</h2>
            <div class="saved-list" id="savedList"></div>
        </div>

            <div class="list-header-controls">

                        <option value="og">OG</option>

                    </select>
                </div>
            </div>
            <div class="rot-grid" id="rotGrid"></div>
        </div>

            { name: "Udin Din Din Dun", rarity: "godly", baseInc: 1800 }, { name: "Pandaccini Bananini", rarity: "godly", baseInc: 2000 }, { name: "Waterino", rarity: "godly", baseInc: 2100 }, { name: "Strawberreli Flamingelli", rarity: "godly", baseInc: 2300 }, { name: "Sigma Boy", rarity: "godly", baseInc: 2400 }, { name: "Frigo Camelo", rarity: "godly", baseInc: 2600 }, { name: "Orangutini Ananasini", rarity: "godly", baseInc: 2700 }, { name: "Rhino Toasterino", rarity: "godly", baseInc: 2800 }, { name: "Bombardiro Crocodilo", rarity: "godly", baseInc: 3100 },

            { name: "Bombini Gusini", rarity: "secret", baseInc: 4700 }, { name: "Castlino Fortini", rarity: "secret", baseInc: 5000 }, { name: "Tuff Toucan", rarity: "secret", baseInc: 5300 }, { name: "Fryuro", rarity: "secret", baseInc: 5800 }, { name: "Burguro", rarity: "secret", baseInc: 6200 }, { name: "Guest666", rarity: "secret", baseInc: 7000 }, { name: "Zibra Zubra Zibralini", rarity: "secret", baseInc: 7700 }, { name: "Cavallo Virtuoso", rarity: "secret", baseInc: 8500 }, { name: "Gorillo Watermelondrillo", rarity: "secret", baseInc: 9500 }, { name: "Cocofanto Elefanto", rarity: "secret", baseInc: 10000 }, { name: "Bambu Sahur", rarity: "secret", baseInc: 12500 },

            { name: "WL", rarity: "divine", baseInc: 15000 }, { name: "Girafa Celeste", rarity: "divine", baseInc: 16000 }, { name: "Tralalero Tralala", rarity: "divine", baseInc: 17500 }, { name: "Tralalerita Tralala", rarity: "divine", baseInc: 18000 }, { name: "Peant Jarro", rarity: "divine", baseInc: 19500 }, { name: "Dipperl Chiperini", rarity: "divine", baseInc: 20000 }, { name: "Rexosaurus", rarity: "divine", baseInc: 22500 }, { name: "1x1x1x1", rarity: "divine", baseInc: 23000 }, { name: "Matteo", rarity: "divine", baseInc: 25000 }, { name: "Espresso Signora", rarity: "divine", baseInc: 27500 },
            // Hacked
            { name: "Alessio", rarity: "hacked", baseInc: 27500 }, { name: "Tripi Tropi Tropa Tripa", rarity: "hacked", baseInc: 28000 }, { name: "Swag Soda", rarity: "hacked", baseInc: 29000 }, { name: "Stoppo Luminino", rarity: "hacked", baseInc: 30000 }, { name: "Torrtuginni Dragonfrutini", rarity: "hacked", baseInc: 32000 }, { name: "Tictac Sahur", rarity: "hacked", baseInc: 38000 }, { name: "Cactus Pingo", rarity: "hacked", baseInc: 44500 }, { name: "Los Primos Blue", rarity: "hacked", baseInc: 44500 }, { name: "La Vacca Saturno Saturnita", rarity: "hacked", baseInc: 48500 }, { name: "Agarrini La Palini", rarity: "hacked", baseInc: 53500 }, { name: "Bottellini", rarity: "hacked", baseInc: 75000 },
            // OG
            { name: "Karkerkar Kurkur", rarity: "og", baseInc: 120000 }, { name: "Blackhole Goat", rarity: "og", baseInc: 125000 }, { name: "Compactoroni Daskaloni", rarity: "og", baseInc: 135000 }, { name: "Cappuccino Clownino", rarity: "og", baseInc: 140000 }, { name: "Nuclearo Dinossauro", rarity: "og", baseInc: 190000 }, { name: "Los Noo My Hotspotsitos", rarity: "og", baseInc: 200000 }, { name: "Chillin Chilli", rarity: "og", baseInc: 220000 }, { name: "Crazylone Pizaione", rarity: "og", baseInc: 225000 }, { name: "Corn Sahur", rarity: "og", baseInc: 225000 }, { name: "Meowl", rarity: "og", baseInc: 275000 }, { name: "Strawberry Elephant", rarity: "og", baseInc: 420000 },
            // Celestial
            { name: "Dragonfrutina Dolphinita", rarity: "celestial", baseInc: 475000 }, { name: "Guerriro Digitale", rarity: "celestial", baseInc: 490000 }, { name: "Chicleteira Bicicleteira", rarity: "celestial", baseInc: 500000 }, { name: "Pot Hotspot", rarity: "celestial", baseInc: 525000 }, { name: "Krupuk Pagi Pagi", rarity: "celestial", baseInc: 540000 }, { name: "Beluga Beluga", rarity: "celestial", baseInc: 575000 }, { name: "Tralaledon", rarity: "celestial", baseInc: 625000 }, { name: "Anpali Babel", rarity: "celestial", baseInc: 750000 }, { name: "Ketchuru and Musturu", rarity: "celestial", baseInc: 800000 }, { name: "Los Primos", rarity: "celestial", baseInc: 800000 }, { name: "Mastodontico Telepiedone", rarity: "celestial", baseInc: 850000 },
            // Eternal
            { name: "Ketupat Kepat", rarity: "eternal", baseInc: 1000000 }, { name: "Professora 67", rarity: "eternal", baseInc: 1000000 }, { name: "Astro Tim", rarity: "eternal", baseInc: 1100000 }, { name: "Baba Yaga", rarity: "eternal", baseInc: 1200000 }, { name: "Kicky", rarity: "eternal", baseInc: 1400000 }
        ];

        let activeMutations = new Set();
        let savedBuilds = [];
        let currentlySelectedTheme = 'og';

        const SAVE_KEY_INCOME   = 'brainrot_v6_income';
        const SAVE_KEY_REBIRTH  = 'brainrot_v6_rebirth';
        const SAVE_KEY_BUILDS   = 'brainrot_v6_builds';
        const SAVE_KEY_THEME    = 'brainrot_v6_theme';

        window.onload = function() {
            let savedIncome = localStorage.getItem(SAVE_KEY_INCOME);
            if (savedIncome) document.getElementById('dayInc').value = savedIncome;
            let savedRebirth = localStorage.getItem(SAVE_KEY_REBIRTH);
            if (savedRebirth) document.getElementById('rebirthMulti').value = savedRebirth;
            
            let storedBuilds = localStorage.getItem(SAVE_KEY_BUILDS);
            if (storedBuilds) { savedBuilds = JSON.parse(storedBuilds); renderSavedBuilds(); }
            let savedTheme = localStorage.getItem(SAVE_KEY_THEME);
            if (savedTheme && THEMES[savedTheme]) setTheme(savedTheme); else setTheme('og');

            renderMutationsList();
            renderBrainrotList();
        };

        function renderMutationsList() {
            const grid = document.getElementById('mutationGrid');
            grid.innerHTML = '';
            MUTATIONS_DATA.forEach(item => {
                grid.innerHTML += `
                    <div class="mutation-row" id="mutrow-${item.id}" onclick="toggleMutation('${item.id}')">
                        <div class="mutation-cb"></div>
                        <span class="mutation-name">${item.name}</span>
                        <span class="mutation-value">${item.val}x</span>
                    </div>
                `;
            });
        }

        function toggleMutation(id) {
            const row = document.getElementById(`mutrow-${id}`);
            if (activeMutations.has(id)) { activeMutations.delete(id); row.classList.remove('selected'); }
            else { activeMutations.add(id); row.classList.add('selected'); }
            globalInputsUpdated();
        }

        function getActiveMutationMultiplier() {
            let mult = 1;
            activeMutations.forEach(id => {
                const item = MUTATIONS_DATA.find(m => m.id === id);
                if (item) mult *= item.val;
            });
            return mult;
        }

        function globalInputsUpdated() {
            liveSaveFields();
            renderBrainrotList();
            if (document.getElementById('results').style.display === 'block') {
                calculateOverride();
            }
        }

        function renderBrainrotList() {
            const grid = document.getElementById('rotGrid');
            const filter = document.getElementById('rarityFilter').value;
            const query = document.getElementById('searchBar').value.toLowerCase().trim();
            grid.innerHTML = '';

            let mutationMult = getActiveMutationMultiplier();
            let rebirthMulti = parseFloat(document.getElementById('rebirthMulti').value) || 1;
            let targetLvl = parseInt(document.getElementById('tarLvl').value) || 75;
            let currentLvl = parseInt(document.getElementById('curLvl').value) || 1;

            if (currentLvl >= targetLvl) currentLvl = 1; 
            let scaleSteps = targetLvl - 1;

            let recordsFound = 0;

            BRAINROT_UPGRADES.forEach(upg => {
                if (filter !== 'all' && upg.rarity !== filter) return;
                
                // Real-time search filter matching name or rarity tags
                if (query !== '') {
                    const matchName = upg.name.toLowerCase().includes(query);
                    const matchRarity = upg.rarity.toLowerCase().includes(query);
                    if (!matchName && !matchRarity) return;
                }

                recordsFound++;

                let rawBaseLvl1 = upg.baseInc * mutationMult;
                let rawRebirthLvl1 = rawBaseLvl1 * rebirthMulti;
                let rawBaseMax = rawBaseLvl1 * Math.pow(1.25, scaleSteps);
                let rawRebirthMax = rawBaseMax * rebirthMulti;

                grid.innerHTML += `
                    <div class="rot-item">
                        <div class="rot-header">
                            <span class="rot-name">${upg.name}</span>
                            <span class="rot-badge badge-${upg.rarity}">${upg.rarity}</span>
                        </div>
                        <div class="rot-body-metrics">
                            <div>Base Level 1: <span>${formatOutput(rawBaseLvl1)}/s</span></div>
                            <div>Rebirth Multi Base Level 1: <span style="color:var(--text-accent);">${formatOutput(rawRebirthLvl1)}/s</span></div>
                            <div>Base Max Lvl (Lvl ${targetLvl}): <span>${formatOutput(rawBaseMax)}/s</span></div>
                            <div>Max Lvl Rebirth Multi (Lvl ${targetLvl}): <span style="color:#2ecc71;">${formatOutput(rawRebirthMax)}/s</span></div>
                        </div>
                    </div>
                `;
            });

            if (recordsFound === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 30px; opacity: 0.6;">No brainrots match your criteria.</div>`;
            }
        }

        function runOverrideMath() {
            let curLvl = parseInt(document.getElementById('curLvl').value);
            let tarLvl = parseInt(document.getElementById('tarLvl').value);
            let rawDailyIncome = parseInput(document.getElementById('dayInc').value);
            let rawCurIncome = parseInput(document.getElementById('curInc').value);
            let rawCurCost = parseInput(document.getElementById('curCost').value);
            let rebirthMulti = parseFloat(document.getElementById('rebirthMulti').value) || 1;

            if (isNaN(curLvl) || isNaN(tarLvl) || rawCurIncome <= 0 || curLvl >= tarLvl) return null;

            let totalCost = 0;
            let tempCost = rawCurCost;
            let growthFactor = 1;

            for (let i = 0; i < (tarLvl - curLvl); i++) {
                if (rawCurCost > 0) { totalCost += tempCost; tempCost *= 1.5; }
                growthFactor *= 1.25;
            }

            let baseLvl1Stat = rawCurIncome / Math.pow(1.25, (curLvl - 1));
            let baseIncNoMulti = rawCurIncome * growthFactor; 
            let finalOutputWithRebirth = baseIncNoMulti * rebirthMulti;
            let currentOutputWithRebirth = rawCurIncome * rebirthMulti;
            let dailyNetAddedValue = (finalOutputWithRebirth - currentOutputWithRebirth) * 86400;

            let timeString = "N/A";
            if (rawDailyIncome > 0 && rawCurCost > 0) {
                let timeHours = totalCost / (rawDailyIncome / 24.0);
                timeString = timeHours < 0.01 ? "Instant" : timeHours < 1 ? (timeHours * 60).toFixed(1) + " mins" : timeHours > 24 ? (timeHours / 24).toFixed(1) + " days" : timeHours.toFixed(1) + " hours";
            }

            return {
                label: `Lvl ${curLvl} → Lvl ${tarLvl} Build`,
                lvl1Base: formatOutput(baseLvl1Stat) + "/s",
                baseInc: formatOutput(baseIncNoMulti) + "/s",
                finalInc: formatOutput(finalOutputWithRebirth) + "/s",
                addedDaily: "+" + formatOutput(dailyNetAddedValue),
                totalCost: rawCurCost > 0 ? formatOutput(totalCost) : "N/A",
                timeReq: timeString
            };
        }

        function calculateOverride() {
            let res = runOverrideMath();
            if (!res) return;
            document.getElementById('resLvl1').innerText = res.lvl1Base;
            document.getElementById('resBaseInc').innerText = res.baseInc;
            document.getElementById('resInc').innerText = res.finalInc;
            document.getElementById('resAddedDaily').innerText = res.addedDaily;
            document.getElementById('resCost').innerText = res.totalCost;
            document.getElementById('resTime').innerText = res.timeReq;
            document.getElementById('results').style.display = 'block';
        }

        function saveOverrideBuild() {
            let data = runOverrideMath();
            if (!data) return;
            savedBuilds.push(data);
            localStorage.setItem(SAVE_KEY_BUILDS, JSON.stringify(savedBuilds));
            renderSavedBuilds();
        }

        function liveSaveFields() {
            localStorage.setItem(SAVE_KEY_INCOME, document.getElementById('dayInc').value);
            localStorage.setItem(SAVE_KEY_REBIRTH, document.getElementById('rebirthMulti').value);
        }

        function parseInput(valStr) {
            if (!valStr) return 0;
            valStr = valStr.toUpperCase().replace(/[\s,$]/g, '');
            for (let suffix of ['QN', 'SP']) {
                if (valStr.endsWith(suffix)) return parseFloat(valStr.slice(0, -suffix.length)) * SUFFIXES[suffix];
            }
            let lastChar = valStr.slice(-1);
            if (SUFFIXES[lastChar]) return parseFloat(valStr.slice(0, -1)) * SUFFIXES[lastChar];
            return parseFloat(valStr) || 0;
        }

        function formatOutput(num) {
            if (num === 0) return '0';
            if (num < 1000) return num.toFixed(2).replace(/\.00$/, '');
            let sortedKeys = Object.keys(SUFFIXES).sort((a, b) => SUFFIXES[b] - SUFFIXES[a]);
            for (let key of sortedKeys) {
                if (num >= SUFFIXES[key]) return (num / SUFFIXES[key]).toFixed(2).replace(/\.00$/, '') + key;
            }
            return num.toFixed(2).replace(/\.00$/, '');
        }

        function deleteBuild(index) {
            savedBuilds.splice(index, 1);
            localStorage.setItem(SAVE_KEY_BUILDS, JSON.stringify(savedBuilds));
            renderSavedBuilds();
        }

        function renderSavedBuilds() {
            const list = document.getElementById('savedList');
            list.innerHTML = '';
            if (savedBuilds.length === 0) {
                list.innerHTML = '<div style="color:var(--text-muted); text-align:center; font-size:14px; margin-top:30px; opacity: 0.6;">No configurations saved yet.</div>';
                return;
            }
            savedBuilds.forEach((build, index) => {
                list.innerHTML += `
                    <div class="saved-item">
                        <div class="saved-title-container">
                            <input class="saved-title" type="text" value="${build.label}" oninput="savedBuilds[${index}].label=this.value; localStorage.setItem(SAVE_KEY_BUILDS, JSON.stringify(savedBuilds));">
                            <button class="btn-del" onclick="deleteBuild(${index})">✕</button>
                        </div>
                        <div class="saved-stats">
                            <div>Base Level 1: <span>${build.lvl1Base}</span></div>
                            <div>Base Max Lvl: <span>${build.baseInc}</span></div>
                            <div>Max Lvl Rebirth Multi: <span style="color:var(--text-accent);">${build.finalInc}</span></div>
                            <div>Daily Gain: <span style="color:#2ecc71;">${build.addedDaily}</span></div>
                            <div>Cost: <span>${build.totalCost}</span></div>
                            <div>Time: <span style="color:var(--border-glow);">${build.timeReq}</span></div>
                        </div>
                    </div>
                `;
            });
        }

        function setTheme(themeKey) {
            currentlySelectedTheme = themeKey;
            const theme = THEMES[themeKey];
            const root = document.documentElement;
            root.style.setProperty('--bg-main', theme.main);
            root.style.setProperty('--bg-card', theme.card);
            root.style.setProperty('--bg-input', theme.input);
            root.style.setProperty('--border-glow', theme.glow);
            root.style.setProperty('--text-accent', theme.accent);
            root.style.setProperty('--text-muted', theme.muted);
            root.style.setProperty('--card-shadow', theme.shadow);
            root.style.setProperty('--card-border', theme.border);

            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`theme-${themeKey}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function saveDefaultTheme() {
            localStorage.setItem(SAVE_KEY_THEME, currentlySelectedTheme);
            const defBtn = document.getElementById('setDefaultBtn');
            defBtn.innerText = '✓ Default Set!';
            setTimeout(() => { defBtn.innerText = 'Use as Default'; }, 2000);
        }
    </script>
