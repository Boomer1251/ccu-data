name: Update CCU Data

on:
  schedule:
    - cron: '0 * * * *' # Executes every single hour on the dot
  workflow_dispatch: # Allows manual testing triggers straight from GitHub Actions panel

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # Grants precise write access to repo contents for programmatic pushing
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Runtime Environment (Python 3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Provision Network Handlers
        run: pip install requests

      - name: Run Telemetry Engine Pipeline
        run: python update_ccu.py

      - name: Synchronize and Commit Changes Safely
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # Only perform deployment execution steps if JSON file was modified
          if ! git diff --quiet ccu_data.json; then
            git add ccu_data.json
            git commit -m "Auto-update CCU data [skip ci]"
            git push origin HEAD
          else
            print "No deviation found in CCU stream tracker metrics. Skipping commit sequence."
          fi
